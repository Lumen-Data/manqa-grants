name: Scrape Manq'a Grants

on:
  schedule:
    # Every 2 days 10:00 AM Bolivia time (BOT = UTC-4) — offset from bolivia-opportunities
    - cron: '0 14 */2 * *'
  repository_dispatch:
    types: [scrape]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false

concurrency:
  group: scrape
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Crawl4AI
        run: python3 -m patchright install chromium

      - name: Run scraper
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GLOBALGIVING_API_KEY: ${{ secrets.GLOBALGIVING_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python3 scraper.py --save

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json results/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Manq'a grants data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase -X theirs origin main || git rebase --abort
            git push
          fi
